                </div>
                <div class="member-links">
                    <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                </div>
            </div>

            <!-- 박윤승 Backend 카드 -->
            <div class="member-card">
                <div class="profile-img-placeholder">
                    <i class="fas fa-server"></i>
                </div>
