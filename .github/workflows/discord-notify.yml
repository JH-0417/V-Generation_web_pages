name: Discord Push Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Rich Discord Notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PUSHER: ${{ github.actor }}
          REPO: ${{ github.event.repository.name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          python3 -c '
          import os, json, urllib.request
          
          webhook_url = os.environ.get("WEBHOOK_URL")
          pusher = os.environ.get("PUSHER")
          repo = os.environ.get("REPO")
          msg = os.environ.get("COMMIT_MSG", "커밋 메시지 없음")
          url = os.environ.get("COMMIT_URL", "")
          
          # payload에서 "content": "@everyone" 부분을 삭제했습니다.
          payload = {
              "embeds": [{
                  "title": f"[{repo}] 새로운 푸시 알림",
                  "description": f"**{pusher}**님이 코드를 업데이트했습니다.\n\n**커밋 메시지:**\n`{msg}`",
                  "url": url,
                  "color": 5814783,
                  "author": {
                      "name": pusher,
                      "icon_url": f"https://github.com/{pusher}.png"
                  }
              }]
          }
          
          headers = {
              "Content-Type": "application/json",
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
          }
          
          req = urllib.request.Request(
              webhook_url, 
              data=json.dumps(payload).encode("utf-8"), 
              headers=headers
          )
          urllib.request.urlopen(req)
          '