<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- 네온 글로우 효과 필터 정의 -->
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 메인 화살표 바디 (딥 다크 배경 + 네온 시안 테두리) -->
  <path d="M10 10 L22 40 L28 28 L40 22 Z" 
        fill="#0b051a" 
        stroke="#00ffcc" 
        stroke-width="2.5" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
        
  <!-- 꼬리 부분 장식 (개발자 꺾쇠 괄호 '>' 포인트) -->
  <path d="M28 32 L36 38 L26 44" 
        fill="none" 
        stroke="#00ffcc" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
</svg>
